<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank you!</title>

  <!-- ===== OG-теги — Stream читает их и строит превью ===== -->
  <!-- ГЛАВНОЕ: og:image — ссылка на КАРТИНКУ-КАРТОЧКУ (в неё впечатаны фото/имя/заголовок). -->
  <!-- После заливки card.png в тот же репозиторий эта ссылка будет рабочей. -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Thank you!">
  <meta property="og:description" content="A big thank you from me for the great experience!">
  <meta property="og:image" content="https://ssstolen.github.io/thanks/card.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="Andrew">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Thank you!">
  <meta name="twitter:description" content="A big thank you from me for the great experience!">
  <meta name="twitter:image" content="https://ssstolen.github.io/thanks/card.jpg">
</head>
<body style="font-family:sans-serif;text-align:center;padding:40px">
  <h1>Thank you!</h1>
  <p>A big thank you from me for the great experience!</p>
  <img src="card.jpg" alt="card" style="max-width:100%;height:auto">
</body>
</html>
